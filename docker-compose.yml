version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartlink
      POSTGRES_USER: smartlink
      POSTGRES_PASSWORD: smartlink_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartlink']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartlink-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartlink-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      BASE_URL: http://localhost:5000
      DATABASE_URL: postgresql://smartlink:smartlink_dev@postgres:5432/smartlink
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '5000:5000'
    volumes:
      # Mount source for live reload in dev (comment out for prod-like testing)
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm run dev"

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: smartlink-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
